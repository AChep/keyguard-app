name: "GitHub Submit PR"
inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  commit-message:
    description: 'Commit message'
    required: true
  commit-branch:
    description: 'Commit branch'
    required: true
runs:
  using: "composite"
  steps:
    - name: "Check if any changes"
      id: check-changes
      run: |
        has_changes=$(if [ -n "$(git status --porcelain)" ]; then echo "true"; else echo "false"; fi)
        echo "$has_changes"
        echo "HAS_CHANGES=$has_changes" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Configure Git and Commit
      if: ${{ steps.check-changes.outputs.HAS_CHANGES == 'true' }}
      shell: bash
      env:
        COMMIT_BRANCH: ${{ inputs.commit-branch }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git config --global user.name "keyguard-bot"
        git config --global user.email "keyguard-bot@artemchep.com"

        # Checkout target branch (carrying over current changes)
        # -B forces creation or reset of the branch
        git checkout -B "$COMMIT_BRANCH"

        # Commit
        git add .
        git commit -m "[AUTO] $COMMIT_MESSAGE"

        # Push
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git push origin "$COMMIT_BRANCH" --force
    - name: Create Pull Request
      if: ${{ steps.check-changes.outputs.HAS_CHANGES == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        COMMIT_BRANCH: ${{ inputs.commit-branch }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        existing_pr_url="$(
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base master \
            --head "$COMMIT_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url'
        )"

        if [ -n "$existing_pr_url" ]; then
          echo "PR already exists: $existing_pr_url"
          exit 0
        fi

        gh pr create \
          --repo "$GITHUB_REPOSITORY" \
          --base master \
          --head "$COMMIT_BRANCH" \
          --title "$COMMIT_MESSAGE" \
          --body "Automated PR created by GitHub Action" \
          --assignee "AChep" \
          --label "robot,enhancement"
