name: "GitHub Trigger WF"
inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  github-wf-repo:
    description: 'GitHub Workflow Repo'
    required: true
    default: "AChep/keyguard-app"
  github-wf-branch:
    description: 'GitHub Workflow Branch'
    required: true
    default: "master"
  github-wf-file:
    description: 'GitHub Workflow File'
    required: true
runs:
  using: "composite"
  steps:
    - name: Trigger Workflow
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        WF_FILE: ${{ inputs.github-wf-file }}
        WF_REPO: ${{ inputs.github-wf-repo }}
        WF_BRANCH: ${{ inputs.github-wf-branch }}
      run: |
        gh workflow run "$WF_FILE" \
          --repo "$WF_REPO" \
          --ref "$WF_BRANCH"
