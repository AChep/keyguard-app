name: "Setup Gradle"
inputs:
  # We use Jetbrains distribution because it contains many fixes
  # for AWT. For example, with the other distributions I can not
  # make a POPUP window and have an input field in it.
  java-distribution:
    description: 'Java Distribution'
    required: true
    default: 'jetbrains'
  java-version:
    description: 'Java Version'
    required: true
    default: '21'
  cache-write-only:
    description: 'Cache Write Only'
    required: true
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: "Setup JDK"
      id: setup-java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        distribution: ${{ inputs.java-distribution }}
        java-version: ${{ inputs.java-version }}
    - name: "Setup Gradle"
      uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884
      env:
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
      with:
        cache-write-only: ${{ inputs.cache-write-only }}
