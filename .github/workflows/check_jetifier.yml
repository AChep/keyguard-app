name: "✔️ Check Jetifier"

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-jetifier:
    name: Check Jetifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup_gradle
      - name: "Check Jetifier"
        run: ./gradlew checkJetifier
