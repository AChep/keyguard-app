name: "⬆️ GitHub release -> Scoop deployment"

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  new-update:
    name: Deploy Scoop
    runs-on: ubuntu-slim
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: "Trigger Workflow"
        uses: ./.github/actions/github_trigger_wf
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          github-wf-repo: AChep/keyguard-repo-scoop
          github-wf-file: excavator.yml
