name: "🕒 Synchronize Two-factor auth"

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      # Configuration.
      - '.github/update_twofactorauth.py'

permissions:
  contents: read

jobs:
  sync-2fa:
    name: Synchronize Two-factor authentication
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: "Update library"
        run: |
          python .github/update_twofactorauth.py
      - uses: ./.github/actions/github_submit_pr
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          commit-message: "Update two-factor auth library"
          commit-branch: tfa_2factorauth_action
