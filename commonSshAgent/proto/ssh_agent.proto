syntax = "proto3";

package keyguard.sshagent;

message IpcRequest {
  uint64 id = 1;

  oneof request {
    AuthenticateRequest authenticate = 2;
    ListKeysRequest list_keys = 3;
    SignDataRequest sign_data = 4;
  }
}

message IpcResponse {
  uint64 id = 1;

  oneof response {
    AuthenticateResponse authenticate = 2;
    ListKeysResponse list_keys = 3;
    SignDataResponse sign_data = 4;
    ErrorResponse error = 15;
  }
}

message AuthenticateRequest {
  bytes token = 1;
}

message AuthenticateResponse {
  bool success = 1;
}

message CallerIdentity {
  uint32 pid = 1;
  uint32 uid = 2;
  uint32 gid = 3;
  string process_name = 4;
  string executable_path = 5;
  uint32 app_pid = 6;
  // Human-readable app label when available.
  //
  // Platform mapping:
  // - Desktop: owning app name
  // - Android: sender app label derived in-app from broadcast sender metadata
  //
  // Provenance can differ from the process-level fields above. On Android,
  // this value is intended to be framework-derived by Keyguard, while
  // pid/uid/gid/process_name/executable_path come from the protobuf request
  // generated by the SSH agent transport.
  string app_name = 7;
  // App location identifier when available.
  //
  // Platform mapping:
  // - Desktop: app bundle/application path
  // - Android: sender package name
  //
  // This field does not imply the same trust level on every platform.
  // Consumers must treat it according to the transport that supplied it.
  string app_bundle_path = 8;
}

message ListKeysRequest {
  CallerIdentity caller = 1;
}

message ListKeysResponse {
  repeated SshKey keys = 1;
}

message SshKey {
  string name = 1;
  string public_key = 2;
  string key_type = 3;
  string fingerprint = 4;
}

message SignDataRequest {
  string public_key = 1;
  bytes data = 2;
  uint32 flags = 3;
  CallerIdentity caller = 4;
}

message SignDataResponse {
  bytes signature = 1;
  string algorithm = 2;
}

message ErrorResponse {
  string message = 1;
  ErrorCode code = 2;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_VAULT_LOCKED = 1;
  ERROR_CODE_USER_DENIED = 2;
  ERROR_CODE_KEY_NOT_FOUND = 3;
  ERROR_CODE_AUTH_FAILED = 4;
  ERROR_CODE_NOT_AUTHENTICATED = 5;
}
